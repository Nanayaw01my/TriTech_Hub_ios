services:
  - type: web
    name: ittek-solution
    env: node
    region: oregon
    plan: free
    buildCommand: npm --prefix frontend install && npm --prefix frontend run build && npm --prefix backend install
    startCommand: node backend/server.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRE
        value: 24h
      - key: FRONTEND_URL
        sync: false
      - key: EMAIL_HOST
        value: smtp.gmail.com
      - key: EMAIL_PORT
        value: 587
      - key: EMAIL_USER
        sync: false
      - key: EMAIL_PASS
        sync: false
      - key: EMAIL_FROM
        sync: false
      - key: UPLOAD_PATH
        value: ./uploads
      - key: MAX_FILE_SIZE
        value: 5242880
      - key: LARGE_SALE_THRESHOLD
        value: 5000
      - key: EXPENSE_THRESHOLD
        value: 1000
